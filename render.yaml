services:
  - type: web
    name: nubevigia-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: ONAMET_SIMULATE_EMERGENCY
        value: "false"
      - key: ONAMET_SIMULATE_WATCH
        value: "false"
      - key: FRONTEND_URL
        sync: false

  - type: web
    name: nubevigia-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
