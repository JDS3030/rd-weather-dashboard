version: '3.8'

services:

  backend:
    build:
      context: ./backend
    ports:
      - "3001:3001"
    env_file: ./backend/.env
    volumes:
      - backend_logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

  python-monitor:
    build:
      context: ./scripts
    command: python emergency_monitor.py
    env_file: ./scripts/.env
    depends_on:
      - backend
    restart: unless-stopped

  python-daily:
    build:
      context: ./scripts
    command: python daily_report.py
    env_file: ./scripts/.env
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_logs:
